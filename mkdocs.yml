site_name: AIDBA Notes
site_description: Database Administration Knowledge Base
site_url: https://your-username.github.io/aidbanotes/

theme:
  name: material
  palette:
    scheme: default
    primary: indigo
    accent: blue
  font:
    text: Source Sans 3
    code: JetBrains Mono
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search
  - post_count

markdown_extensions:
  - toc:
      permalink: true
  - tables
  - attr_list
  - def_list
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite

extra_css:
  - assets/css/custom.css
